services:
  # ─────────────────────────────────────────────────────────────────
  # C2 — Audio Serializer Connectivity (Linux only)
  # Run: docker compose run --rm c2-audio-serializer
  # ─────────────────────────────────────────────────────────────────
  c2-audio-serializer:
    build:
      context: ./tests/c2_voice_linux_sdk
      dockerfile: Dockerfile
    env_file: .env
    network_mode: host
    working_dir: /workspace/tests/c2_voice_linux_sdk
    volumes:
      - .:/workspace:ro
    profiles: [c2]

  # ─────────────────────────────────────────────────────────────────
  # C3 — Pipecat Serializer echo bot (Linux only)
  # Run: docker compose run --rm c3-pipecat-serializer
  # ─────────────────────────────────────────────────────────────────
  c3-pipecat-serializer:
    build:
      context: ./tests/c3_pipecat_serializer
      dockerfile: Dockerfile
    env_file: .env
    network_mode: host
    stdin_open: false
    tty: false
    working_dir: /workspace/tests/c3_pipecat_serializer
    volumes:
      - .:/workspace:ro
    profiles: [c3]

  # ─────────────────────────────────────────────────────────────────
  # app — Full integrated agent (Linux only)
  # Run: docker compose up app
  # ─────────────────────────────────────────────────────────────────
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - ${HOME}/.aws:/root/.aws:ro
      - ./private.key:/app/private.key:ro
    ports:
      - "${PORT:-8000}:8000"
    restart: unless-stopped
    profiles: [app]
